<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aula 2 - Linguagem C</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.7;
            min-height: 100vh;
            background: linear-gradient(170deg, #1a0a28 0%, #2d1047 25%, #3d1560 45%, #6b1a5e 70%, #8f2d6b 85%, #b648a0 100%);
            background-attachment: fixed;
            color: #f0e0ff;
            overflow-x: hidden;
        }

        /* === ANIMATED BUBBLES === */
        .bubbles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%,
                rgba(255, 255, 255, 0.35),
                rgba(255, 255, 255, 0.12) 40%,
                rgba(200, 100, 255, 0.08) 60%,
                rgba(220, 0, 180, 0.04) 80%,
                transparent 100%);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow:
                inset 0 -4px 8px rgba(255, 255, 255, 0.06),
                inset 0 4px 8px rgba(255, 255, 255, 0.1),
                0 0 20px rgba(200, 100, 255, 0.07);
            animation: floatUp linear infinite;
        }

        .bubble::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 20%;
            width: 30%;
            height: 20%;
            background: radial-gradient(ellipse, rgba(255,255,255,0.5), transparent);
            border-radius: 50%;
            transform: rotate(-30deg);
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) translateX(0) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-120px) translateX(var(--drift)) scale(var(--end-scale));
                opacity: 0;
            }
        }

        /* === MAIN CONTAINER === */
        .main-container {
            position: relative;
            z-index: 1;
            max-width: 860px;
            margin: 0 auto;
            padding: 30px 20px 60px;
        }

        /* === TOP NAV BAR === */
        .top-nav {
            display: flex;
            justify-content: center;
            padding: 18px 20px 0;
        }

        .top-nav a.home-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            font-weight: 700;
            font-size: 0.95em;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.07));
            padding: 10px 22px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .top-nav a.home-btn:hover {
            background: linear-gradient(135deg, rgba(255,255,255,0.25), rgba(255,255,255,0.12));
            border-color: rgba(255,255,255,0.4);
            box-shadow: 0 0 25px rgba(200, 100, 255, 0.2);
            transform: translateY(-2px);
        }

        /* === PAGE NAVIGATION === */
        .page-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-top: 10px;
        }

        .page-nav a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            font-weight: 700;
            font-size: 1em;
            background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06));
            padding: 12px 24px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.18);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .page-nav a:hover {
            background: linear-gradient(135deg, rgba(255,255,255,0.22), rgba(255,255,255,0.1));
            border-color: rgba(255,255,255,0.35);
            box-shadow: 0 0 25px rgba(200, 100, 255, 0.15);
            transform: translateY(-2px);
        }

        .page-nav .nav-placeholder {
            width: 160px;
        }

        /* === HEADER === */
        h1 {
            text-align: center;
            font-size: 2.6em;
            font-weight: 800;
            margin: 30px 0 40px;
            color: #fff;
            text-shadow: 0 0 30px rgba(200, 100, 255, 0.5), 0 0 60px rgba(200, 100, 255, 0.2);
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #e0a0ff 50%, #d460c8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2 {
            color: #e0b8ff;
            font-weight: 700;
            font-size: 1.45em;
            margin-top: 0;
            margin-bottom: 14px;
            text-shadow: 0 0 15px rgba(200, 100, 255, 0.25);
        }

        /* === GLASSMORPHISM CARDS === */
        section {
            background: linear-gradient(135deg,
                rgba(255, 255, 255, 0.1) 0%,
                rgba(255, 255, 255, 0.05) 100%);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 28px 30px;
            margin-bottom: 24px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.15),
                0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        }

        section:hover {
            transform: translateY(-3px);
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.2),
                0 0 50px rgba(200, 100, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.25);
        }

        /* === CODE BLOCKS === */
        pre {
            background: linear-gradient(135deg,
                rgba(10, 15, 30, 0.85),
                rgba(25, 15, 50, 0.9));
            color: #d47dff;
            padding: 20px;
            border-radius: 14px;
            overflow-x: auto;
            border: 1px solid rgba(200, 100, 255, 0.15);
            box-shadow:
                inset 0 2px 10px rgba(0, 0, 0, 0.3),
                0 4px 15px rgba(0, 0, 0, 0.2);
            font-size: 0.92em;
            line-height: 1.6;
            position: relative;
        }

        pre::before {
            content: 'C';
            position: absolute;
            top: 8px;
            right: 14px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.7em;
            font-weight: 700;
            color: rgba(200, 100, 255, 0.4);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        code {
            font-family: 'Consolas', 'Fira Code', monospace;
        }

        /* === LINKS === */
        a {
            color: #d47dfc;
            text-decoration: none;
            font-weight: 600;
            background: linear-gradient(135deg, rgba(200, 100, 255, 0.15), rgba(255, 100, 200, 0.1));
            padding: 2px 10px;
            border-radius: 8px;
            border: 1px solid rgba(200, 100, 255, 0.2);
            transition: all 0.3s ease;
            display: inline-block;
        }

        a:hover {
            color: #fff;
            background: linear-gradient(135deg, rgba(200, 100, 255, 0.3), rgba(255, 100, 200, 0.2));
            border-color: rgba(200, 100, 255, 0.5);
            box-shadow: 0 0 20px rgba(200, 100, 255, 0.2);
            transform: translateY(-1px);
        }

        /* === LISTS === */
        ul, ol {
            margin-left: 10px;
            padding-left: 20px;
        }

        li {
            margin-bottom: 8px;
            position: relative;
        }

        ol li::marker {
            color: #d47dfc;
            font-weight: 700;
        }

        ul li::marker {
            color: #d460c8;
        }

        /* === BOLD / STRONG === */
        strong {
            color: #e0a0ff;
            font-weight: 700;
        }

        /* === PARAGRAPHS === */
        p {
            color: rgba(240, 224, 255, 0.9);
            margin-bottom: 12px;
        }

        /* === SCROLLBAR === */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(200, 100, 255, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(200, 100, 255, 0.5);
        }

        /* === RESPONSIVE === */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.8em;
            }
            section {
                padding: 20px 18px;
                border-radius: 14px;
            }
            pre {
                padding: 14px;
                font-size: 0.85em;
            }
            .main-container {
                padding: 15px 12px 40px;
            }
            .top-nav a.home-btn {
                font-size: 0.85em;
                padding: 8px 16px;
            }
            .page-nav a {
                font-size: 0.85em;
                padding: 10px 16px;
            }
            .page-nav .nav-placeholder {
                width: 100px;
            }
        }
    </style>
</head>

<body>

<!-- Animated Bubbles -->
<div class="bubbles-container" id="bubbles"></div>

<div class="main-container">

<div class="top-nav">
    <a class="home-btn" href="https://sites.google.com/view/profpessoa/p%C3%A1gina-inicial" target="_blank">&#127968; Página Inicial do Curso</a>
</div>

<h1>Aula 2 - Linguagem C</h1>

<section>
    <h2>Conteúdo em breve</h2>
    <p>
        O conteúdo da Aula 2 será publicado em breve. Fique atento!
    </p>
</section>

<div class="page-nav">
    <a href="index.html">&#10132; Aula 1</a>
    <span class="nav-placeholder"></span>
</div>

</div><!-- end main-container -->

<script>
(function() {
    const container = document.getElementById('bubbles');
    const bubbleCount = 25;

    function createBubble() {
        const bubble = document.createElement('div');
        bubble.classList.add('bubble');

        const size = Math.random() * 80 + 20;
        const left = Math.random() * 100;
        const duration = Math.random() * 12 + 10;
        const delay = Math.random() * 15;
        const drift = (Math.random() - 0.5) * 150;
        const endScale = Math.random() * 0.5 + 0.6;

        bubble.style.width = size + 'px';
        bubble.style.height = size + 'px';
        bubble.style.left = left + '%';
        bubble.style.animationDuration = duration + 's';
        bubble.style.animationDelay = delay + 's';
        bubble.style.setProperty('--drift', drift + 'px');
        bubble.style.setProperty('--end-scale', endScale);

        container.appendChild(bubble);
    }

    for (let i = 0; i < bubbleCount; i++) {
        createBubble();
    }
})();
</script>

</body>
</html>
